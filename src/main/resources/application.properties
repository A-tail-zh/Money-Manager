spring.application.name=Money Manager

# database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager
spring.datasource.username=root
spring.datasource.password=123456

server.servlet.context-path=/api/v1.0

# jpa configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# email configuration
spring.mail.host=smtp.163.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
# SSL(465)
spring.mail.properties.mail.smtp.ssl.enable=true
# email from
spring.mail.properties.mail.smtp.from=${MAIL_USERNAME}

jwt.secret=3f9a7c8e1b6d4a2f9e7c1d5b8a3f6c2e9d4a7b1c6f8e3d2a5c9b7e4f1a6d8c2
jwt.expiration=86400000
jwt.refresh-expiration=604800000

money.manager.frontend.url=http://localhost:5173
